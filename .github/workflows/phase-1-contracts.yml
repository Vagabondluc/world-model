name: Phase 1 Contracts

on:
  push:
    paths:
      - "**"
  pull_request:
    paths:
      - "**"

jobs:
  phase1-contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: python -m pip install -r requirements.txt
      - name: Run Phase 0/1 scope tests
        run: python -m unittest discover scripts/tests -v
      - name: Run Phase 1 contract checks
        run: python scripts/check_phase_1_contracts.py
